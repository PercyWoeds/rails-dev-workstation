# ==============================================================================
# Tmux Advanced Configuration - Vim-Like Workstation Environment
# ==============================================================================

# --- Terminal Compatibility & Color Engine ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"

# --- Core Settings ---
set -g prefix Ctrl-a
unbind C-b
bind-key C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 100000

# --- Vim Navigation Rules for Panes & Windows ---
setw -g mode-keys vi

bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegación fluida entre paneles con teclas de movimiento Vim
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Redimensionamiento intuitivo de paneles
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Navegación en modo copia al estilo Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# --- Tokyo Night Status Bar Theme ---
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 50
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] 󰖼 Session: #S #[bg=#1a1b26] "
set -g status-right "#[fg=#7aa2f7,bg=#1f2335] 󰥔 %Y-%m-%d %H:%M #[fg=#15161e,bg=#9ece6a,bold]  #H "

setw -g window-status-current-style "fg=#7dcfff,bg=#24283b,bold"
setw -g window-status-current-format " #I:#W#F "
setw -g window-status-style "fg=#565f89,bg=#1a1b26"
setw -g window-status-format " #I:#W "

set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# --- Plugin Management (Idempotent Autoload) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Configuración de Resurrect y Continuum para resguardo automático
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Inicializador automático de TPM de manera desatendida si no existe
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'